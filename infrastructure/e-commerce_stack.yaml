AWSTemplateFormatVersion: '2010-09-09'
Description: Wysoko dostepne srodowisko webowe AWS - E-commerce (WordPress + WooCommerce)

Parameters:
  DBPassword:
    Type: String
    NoEcho: true

Resources:
  VPCAL:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: WordPress-VPC

  IGWAL:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WordPress-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IGWAL
      VpcId: !Ref VPCAL

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1a
      CidrBlock: 10.0.1.0/24
      VpcId: !Ref VPCAL
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PubSubnetA

  PrivateAPPSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1a
      CidrBlock: 10.0.10.0/24
      VpcId: !Ref VPCAL
      Tags:
        - Key: Name
          Value: APPSubnetA

  PrivateDBSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1a
      CidrBlock: 10.0.20.0/24
      VpcId: !Ref VPCAL
      Tags:
        - Key: Name
          Value: DBSubnetA

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1b
      CidrBlock: 10.0.2.0/24
      VpcId: !Ref VPCAL
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PubSubnetB

  PrivateAPPSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1b
      CidrBlock: 10.0.11.0/24
      VpcId: !Ref VPCAL
      Tags:
        - Key: Name
          Value: APPSubnetB

  PrivateDBSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1b
      CidrBlock: 10.0.21.0/24
      VpcId: !Ref VPCAL
      Tags:
        - Key: Name
          Value: DBSubnetB

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPCAL
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGWAL
      RouteTableId: !Ref PublicRouteTable

  SubAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  SubBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  ALBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access for ALB
      VpcId: !Ref VPCAL
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EC2SG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP from ALB
      VpcId: !Ref VPCAL
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSG

  RDSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: MySQL access from EC2
      VpcId: !Ref VPCAL
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SG

  EFSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: NFS access from EC2
      VpcId: !Ref VPCAL
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SG

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      FileSystemTags:
        - Key: Name
          Value: WordPressEFS

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SecurityGroups:
        - !Ref EFSSG
      SubnetId: !Ref PrivateAPPSubnetA

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SecurityGroups:
        - !Ref EFSSG
      SubnetId: !Ref PrivateAPPSubnetB

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for RDS Multi-AZ
      SubnetIds:
        - !Ref PrivateDBSubnetA
        - !Ref PrivateDBSubnetB

  MySQLDB:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: '20'
      DBInstanceClass: db.t3.micro
      Engine: mysql
      MasterUsername: wp_admin
      MasterUserPassword: !Ref DBPassword
      DBName: wordpress_db
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSG
      MultiAZ: true
      PubliclyAccessible: false

  WPLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: ami-098e39bafa7e7303d
        InstanceType: t3.micro
        SecurityGroupIds:
          - !Ref EC2SG
        IamInstanceProfile:
          Name: LabInstanceProfile
        UserData: !Base64
          Fn::Sub: |
            #!/bin/bash

            dnf update -y
            dnf install -y httpd wget php-fpm php-mysqli php-json php php-devel amazon-efs-utils

            sed -i 's/memory_limit = 128M/memory_limit = 512M/' /etc/php.ini
            sed -i 's/max_execution_time = 30/max_execution_time = 300/' /etc/php.ini
            sed -i 's/upload_max_filesize = 2M/upload_max_filesize = 64M/' /etc/php.ini
            sed -i 's/post_max_size = 8M/post_max_size = 64M/' /etc/php.ini
            sed -i 's/default_socket_timeout = 60/default_socket_timeout = 300/' /etc/php.ini

            sed -i 's/^request_terminate_timeout.*/request_terminate_timeout = 300/' /etc/php-fpm.d/www.conf
            grep -q 'request_terminate_timeout' /etc/php-fpm.d/www.conf || \
              echo 'request_terminate_timeout = 300' >> /etc/php-fpm.d/www.conf

            printf 'Timeout 300\nProxyTimeout 300\n' > /etc/httpd/conf.d/timeouts.conf

            setsebool -P httpd_use_nfs 1
            setsebool -P httpd_can_network_connect 1

            systemctl start httpd
            systemctl enable httpd
            systemctl start php-fpm
            systemctl enable php-fpm

            mkdir -p /var/www/html/wp-content
            mount -t efs ${EFSFileSystem}:/ /var/www/html/wp-content
            echo "${EFSFileSystem}:/ /var/www/html/wp-content efs _netdev,tls 0 0" >> /etc/fstab

            mkdir -p /var/www/html/wp-content/plugins
            mkdir -p /var/www/html/wp-content/uploads
            mkdir -p /var/www/html/wp-content/themes
            mkdir -p /var/www/html/wp-content/languages

            mkdir -p /opt/wp-upgrade
            mkdir -p /var/www/html/wp-content/upgrade
            mount --bind /opt/wp-upgrade /var/www/html/wp-content/upgrade
            echo "/opt/wp-upgrade /var/www/html/wp-content/upgrade none bind 0 0" >> /etc/fstab
            chown apache:apache /opt/wp-upgrade
            chmod 775 /opt/wp-upgrade
            chcon -R -t httpd_sys_rw_content_t /opt/wp-upgrade

            if [ ! -f /var/www/html/wp-config.php ]; then
                cd /tmp
                wget https://wordpress.org/latest.tar.gz
                tar -xzf latest.tar.gz
                cp -r wordpress/* /var/www/html/

                cp /var/www/html/wp-config-sample.php /var/www/html/wp-config.php
                sed -i "s/database_name_here/${MySQLDB.DBName}/" /var/www/html/wp-config.php
                sed -i "s/username_here/${MySQLDB.MasterUsername}/" /var/www/html/wp-config.php
                sed -i "s/password_here/${DBPassword}/" /var/www/html/wp-config.php
                sed -i "s/localhost/${MySQLDB.Endpoint.Address}/" /var/www/html/wp-config.php

                echo "define('WP_TEMP_DIR', '/tmp/');" >> /var/www/html/wp-config.php
                echo "define('FS_METHOD', 'direct');" >> /var/www/html/wp-config.php
            fi

            chown -R apache:apache /var/www/html/
            chmod -R 775 /var/www/html/wp-content

            systemctl restart httpd
            systemctl restart php-fpm

  WPTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckPath: /wp-admin/install.php
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPCAL
      TargetType: instance

  WordPressALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSG
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '300'

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WPTargetGroup
      LoadBalancerArn: !Ref WordPressALB
      Port: 80
      Protocol: HTTP

  WordPressASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      DesiredCapacity: '2'
      MaxSize: '4'
      MinSize: '2'
      LaunchTemplate:
        LaunchTemplateId: !Ref WPLaunchTemplate
        Version: !GetAtt WPLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PrivateAPPSubnetA
        - !Ref PrivateAPPSubnetB
      TargetGroupARNs:
        - !Ref WPTargetGroup

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: WordPress-NAT

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPCAL
      Tags:
        - Key: Name
          Value: PrivateRouteTable

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateAppSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateAPPSubnetA

  PrivateAppSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateAPPSubnetB

Outputs:
  WebsiteURL:
    Description: URL of the WordPress site
    Value: !Sub http://${WordPressALB.DNSName}